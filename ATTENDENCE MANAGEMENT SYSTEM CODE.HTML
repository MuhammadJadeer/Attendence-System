<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
*{box-sizing:border-box;}
html,body{margin:0; padding:0; height:100%; font-family:'Segoe UI',sans-serif;}

/* ===== LOGIN ===== */
#loginPage{
    height:100vh;
    background: linear-gradient(135deg,rgba(30,64,175,0.9),rgba(2,6,23,0.95)),
                url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f") no-repeat center center;
    background-size: cover;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(18px);
    padding:45px;
    width:420px;
    border-radius:25px;
    color:#fff;
    text-align:center;
    box-shadow:0 35px 70px rgba(0,0,0,.6);
}
.login-card input{margin-bottom: 15px;}
.login-card button{border-radius: 20px; font-weight:600;}

/* ===== APP BACKGROUND ===== */
#app{
    min-height:100vh;
    background:
      radial-gradient(circle at top left,#dbeafe,transparent 40%),
      radial-gradient(circle at bottom right,#bfdbfe,transparent 45%),
      linear-gradient(135deg,#eff6ff,#e0f2fe);
    padding-top:90px;
    padding-bottom:60px;
}
.hide{display:none;}

/* ===== NAVBAR ===== */
.navbar{
    background:linear-gradient(135deg,#1e40af,#2563eb);
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    border-bottom:1px solid rgba(255,255,255,.2);
}
.navbar-brand{font-weight:700; letter-spacing:.5px;}
.navbar button{border-radius:20px; font-weight:600; transition:.3s;}
.navbar button:hover{transform:translateY(-2px);}

/* ===== DASHBOARD ===== */
.dashboard-card{
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(18px);
    padding:90px 35px;
    border-radius:28px;
    box-shadow:0 35px 70px rgba(0,0,0,.25);
    text-align:center;
}
.dashboard-card h2{color:#1e3a8a; font-weight:800;}
.quick-actions button{padding:15px 35px; border-radius:30px; font-weight:700; transition:.3s;}
.quick-actions button:hover{transform:translateY(-3px); box-shadow:0 12px 25px rgba(0,0,0,.25);}

/* ===== BOX ===== */
.box{
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 25px 50px rgba(0,0,0,.18);
    margin-bottom:20px;
}

/* ===== TABLE ===== */
.table{border-radius:15px; overflow:hidden;}
.table-hover tbody tr:hover{background:#e0f2fe;}

/* ===== ATTENDANCE STATUS ===== */
.present{background:linear-gradient(135deg,#bbf7d0,#dcfce7)!important;}
.absent{background:linear-gradient(135deg,#fecaca,#fee2e2)!important;}

/* ===== INFO BAR ===== */
.info-bar{
    position:fixed;
    bottom:0;
    width:100%;
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:#fff;
    display:flex;
    justify-content:space-around;
    align-items:center;
    padding:10px 0;
    font-size:14px;
    box-shadow:0 -8px 20px rgba(0,0,0,.3);
    z-index:999;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-card">
        <h3 class="fw-bold mb-2">Attendance System</h3>
        <p class="mb-4">Teacher Login</p>
        <input id="username" class="form-control mb-3" placeholder="Username">
        <input id="password" type="password" class="form-control mb-4" placeholder="Password">
        <button class="btn btn-light w-100 fw-bold" onclick="login()">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
    </div>
</div>

<!-- APP -->
<div id="app" class="hide">

<nav class="navbar navbar-dark fixed-top px-4">
    <span class="navbar-brand">
        <i class="bi bi-clipboard-check"></i> Attendance System
    </span>
    <div>
        <button class="btn btn-light btn-sm me-2" onclick="showDashboard()">Dashboard</button>
        <button class="btn btn-light btn-sm me-2" onclick="showAttendance()">Attendance</button>
        <button class="btn btn-warning btn-sm me-2" onclick="showReport()">Report</button>
        <button class="btn btn-danger btn-sm" onclick="logout()">
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </div>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <div class="dashboard-card">
        <h2>Welcome Teacher 👋</h2>
        <p class="text-muted mb-4">Manage attendance smartly & efficiently</p>
        
        <!-- Quick Stats -->
        <div class="row text-center mb-4">
          <div class="col-md-4 mb-3">
            <div class="box p-3">
              <i class="bi bi-people-fill fs-1 text-primary"></i>
              <h4 class="mt-2">Total Students</h4>
              <p class="fs-5 fw-bold">20</p>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <div class="box p-3">
              <i class="bi bi-check-circle-fill fs-1 text-success"></i>
              <h4 class="mt-2">Present Today</h4>
              <p class="fs-5 fw-bold" id="statPresent">20</p>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <div class="box p-3">
              <i class="bi bi-x-circle-fill fs-1 text-danger"></i>
              <h4 class="mt-2">Absent Today</h4>
              <p class="fs-5 fw-bold" id="statAbsent">0</p>
            </div>
          </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions mt-3">
          <button class="btn btn-primary me-3" onclick="showAttendance()">
            <i class="bi bi-pencil-square"></i> Mark Attendance
          </button>
          <button class="btn btn-warning" onclick="showReport()">
            <i class="bi bi-bar-chart"></i> View Report
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ATTENDANCE -->
<div id="attendance" class="container mt-4 hide">
    <div class="box">
        <h4 class="mb-3">Attendance List</h4>
        <table class="table table-hover table-bordered">
            <thead class="table-primary">
                <tr><th>#</th><th>Name</th><th>Status</th></tr>
            </thead>
            <tbody id="table"></tbody>
        </table>
        <div class="text-end">
            <button class="btn btn-success me-2" onclick="save()">Save</button>
            <button class="btn btn-primary" onclick="update()">Update</button>
        </div>
    </div>
</div>

<!-- REPORT -->
<div id="report" class="container mt-4 hide">
    <div class="box">
        <h4>Attendance Report</h4>
        <p>Total Students: <b>20</b></p>
        <p>Present: <b id="p">0</b></p>
        <p>Absent: <b id="a">0</b></p>
        <div class="progress">
            <div id="bar" class="progress-bar bg-success" style="width:0%">0%</div>
        </div>
    </div>
</div>

</div>

<!-- INFO BAR -->
<div id="infoBar" class="info-bar hide">
    <div><i class="bi bi-people-fill"></i> Total Students: <b>20</b></div>
    <div><i class="bi bi-calendar-event"></i> <span id="date"></span></div>
    <div><i class="bi bi-check-circle-fill text-success"></i> System Active</div>
</div>

<script>
const students=[
"Jadeer","Mehroz","Shaheer","Asad","Aaron",
"Hamza","Usman","Saad","Bilal","Ayaan",
"Fahad","Rehan","Zain","Arham","Hassan",
"Faizan","Shayan","Danish","Talha","Umer"
];

let data=new Array(20).fill("Present");
const table=document.getElementById("table");

// Populate attendance table
students.forEach((s,i)=>{
table.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${s}</td>
<td>
<select class="form-select" onchange="mark(this,${i})">
<option>Present</option>
<option>Absent</option>
</select>
</td>
</tr>`;
});

function mark(sel,i){
data[i]=sel.value;
let row=sel.parentElement.parentElement;
row.className=sel.value==="Present"?"present":"absent";
}

// LOGIN
function login(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;
if(user && pass){
loginPage.style.display="none";
app.classList.remove("hide");
infoBar.classList.remove("hide");
showDashboard();
document.getElementById("date").innerText=new Date().toDateString();
}else{
alert("Enter username and password!");
}
}

// Show sections
function showDashboard(){
hideAll();
dashboard.classList.remove("hide");
// Update stats
let presentCount=data.filter(x=>x==="Present").length;
let absentCount=data.length-presentCount;
document.getElementById("statPresent").innerText=presentCount;
document.getElementById("statAbsent").innerText=absentCount;
}
function showAttendance(){hideAll();attendance.classList.remove("hide")}
function showReport(){
hideAll();
report.classList.remove("hide");
let p=data.filter(x=>x==="Present").length;
let a=data.length-p;
let per=((p/data.length)*100).toFixed(1);
document.getElementById("p").innerText=p;
document.getElementById("a").innerText=a;
bar.style.width=per+"%";
bar.innerText=per+"%";
}

function hideAll(){
["dashboard","attendance","report"].forEach(id=>{
document.getElementById(id).classList.add("hide");
});
}

function save(){alert("Attendance Saved")}
function update(){alert("Attendance Updated")}
function logout(){location.reload()}
</script>

</body>
</html>
